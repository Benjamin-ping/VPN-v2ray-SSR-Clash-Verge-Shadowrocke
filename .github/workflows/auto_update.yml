name: Auto Update Apple IDs

on:
  schedule:
    # 每天每 6 小时自动执行一次（定时任务）
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许您手动点击按钮立即更新

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run update script
      run: python update_accounts.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add get-apple-id.md
        # 仅在账号数据确实变化时提交修改
        git diff-index --quiet HEAD || git commit -m "docs: auto update shared accounts"
        git push
